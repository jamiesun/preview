<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置</title>
    <script>
      try {
        var ap = JSON.parse(localStorage.getItem("preview-appearance") || "{}");
        var t = ap.theme === "light" || ap.theme === "dark" ? ap.theme
          : matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = t;
        document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="settings-page">
      <h1>翻译设置</h1>
      <p class="hint">兼容 OpenAI Chat Completions 协议：OpenAI / DeepSeek / Moonshot / Ollama / vLLM 等。</p>
      <form id="settings-form">
        <label>
          <span>API Base URL</span>
          <input id="api-base" type="text" placeholder="https://api.openai.com/v1" autocomplete="off" spellcheck="false" />
        </label>
        <label>
          <span>API Key</span>
          <input id="api-key" type="password" placeholder="sk-…" autocomplete="off" />
        </label>
        <label>
          <span>模型</span>
          <input id="model" type="text" placeholder="gpt-4o-mini" autocomplete="off" spellcheck="false" />
        </label>
        <label>
          <span>目标语言</span>
          <input id="target-lang" type="text" list="lang-list" autocomplete="off" />
          <datalist id="lang-list">
            <option value="简体中文"></option>
            <option value="繁體中文"></option>
            <option value="English"></option>
            <option value="日本語"></option>
            <option value="한국어"></option>
            <option value="Français"></option>
            <option value="Deutsch"></option>
            <option value="Español"></option>
          </datalist>
        </label>
        <div class="row">
          <label>
            <span>并发请求数 (1–8)</span>
            <input id="concurrency" type="number" min="1" max="8" step="1" />
          </label>
          <label>
            <span>温度 (0–2)</span>
            <input id="temperature" type="number" min="0" max="2" step="0.1" />
          </label>
        </div>
        <label>
          <span>自定义系统提示词（可选，<code>{lang}</code> 会替换为目标语言）</span>
          <textarea id="system-prompt" rows="4" placeholder="留空使用内置提示词"></textarea>
        </label>
        <div class="actions">
          <button type="button" id="btn-test" class="btn">测试连接</button>
          <span id="test-result" class="test-result"></span>
          <span class="spacer"></span>
          <button type="submit" id="btn-save" class="btn primary">保存</button>
        </div>
      </form>
      <hr />
      <section class="cache-section">
        <h2>翻译缓存</h2>
        <p id="cache-stats" class="hint">…</p>
        <button type="button" id="btn-clear-cache" class="btn danger">清空缓存</button>
      </section>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
