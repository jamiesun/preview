<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#06e0d8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf3fa"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33507a"/>
      <stop offset="1" stop-color="#1d3557"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.75" stop-color="#eaf4ff"/>
      <stop offset="1" stop-color="#d9ecff"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0b3a6b" flood-opacity="0.35"/>
    </filter>
    <filter id="tiny" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0b3a6b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>

  <!-- document page with folded corner -->
  <g filter="url(#soft)">
    <path d="M280 168 h316 l148 148 v496 a44 44 0 0 1 -44 44 H280 a44 44 0 0 1 -44 -44 V212 a44 44 0 0 1 44 -44 z"
          fill="url(#page)"/>
    <path d="M596 168 l148 148 h-116 a32 32 0 0 1 -32 -32 z" fill="#cfe0f2"/>
  </g>

  <!-- text lines on the page -->
  <g fill="#b9cde3">
    <rect x="316" y="268" width="216" height="26" rx="13"/>
    <rect x="316" y="330" width="150" height="26" rx="13"/>
    <rect x="316" y="700" width="330" height="26" rx="13"/>
    <rect x="316" y="762" width="240" height="26" rx="13"/>
  </g>

  <!-- magnifying glass -->
  <g filter="url(#tiny)">
    <!-- handle -->
    <g transform="rotate(45 700 688)">
      <rect x="668" y="666" width="220" height="76" rx="38" fill="url(#rim)"/>
      <rect x="662" y="672" width="40" height="64" rx="14" fill="#c5d5ea"/>
    </g>
    <!-- lens -->
    <circle cx="492" cy="480" r="206" fill="url(#lens)"/>
    <circle cx="492" cy="480" r="206" fill="none" stroke="url(#rim)" stroke-width="42"/>
    <!-- magnified text lines inside lens -->
    <g fill="#a7c4e4" opacity="0.85">
      <rect x="366" y="352" width="252" height="30" rx="15"/>
      <rect x="352" y="588" width="280" height="30" rx="15"/>
    </g>
    <!-- magnified 译 -->
    <text x="492" y="478" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, sans-serif"
          font-size="238" font-weight="700" fill="#0a5fd0"
          text-anchor="middle" dominant-baseline="central">译</text>
    <!-- lens highlight -->
    <path d="M356 356 a186 186 0 0 1 118 -58" fill="none" stroke="#ffffff" stroke-width="26"
          stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
